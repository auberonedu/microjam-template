name: Build PR preview artifact

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Build in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/devcontainer.json
          runCmd: |
            set -euxo pipefail

            make -j

            ROM="$(ls -1 *.gba | head -n 1)"

            rm -rf site
            mkdir site

            cp index.html startEmu.js style.css site/
            cp "$ROM" "site/$ROM"
            printf '{ "rom": "%s" }\n' "$ROM" > site/rom.json

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: pr-site
          path: site
          archive: false